<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
  <title>Loopr Session Exporter</title>
</head>
<body>
  <header class="brand">
    <img class="brand-mark" src="icons/icon-48.png" alt="" width="32" height="32" />
    <div class="brand-text">
      <img class="brand-wordmark" src="icons/wordmark.svg" alt="loopr studio" />
      <div class="brand-sub">Session Exporter</div>
    </div>
  </header>

  <main id="main">
    <section class="loading" id="state-loading">
      <div class="spinner"></div>
      <p class="muted">Looking at the active tab…</p>
    </section>
  </main>

  <footer class="foot">
    <a id="open-studio" href="https://app.loopr.studio/url-sessions" target="_blank" rel="noopener">Open Loopr Studio →</a>
    <span class="ver" id="version">v1.0.0</span>
  </footer>
</body>
<script src="popup.js"></script>
</html>
